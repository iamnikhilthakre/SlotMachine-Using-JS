<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lucky Slots - Slot Machine Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: linear-gradient(145deg, #232526, #414345);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      max-width: 600px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      color: #ffd700;
      font-size: 2.5rem;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      margin-bottom: 5px;
    }

    .subtitle {
      color: #aaa;
      font-size: 0.9rem;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 30px;
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 10px;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      color: #888;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      color: #4ade80;
      font-size: 1.8rem;
      font-weight: bold;
      margin-top: 5px;
    }

    .slot-machine {
      background: linear-gradient(145deg, #3a3a3a, #1a1a1a);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .reels {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .reel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .symbol {
      width: 80px;
      height: 80px;
      background: linear-gradient(145deg, #f5f5f5, #e0e0e0);
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2.5rem;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      transition: transform 0.1s;
    }

    .symbol.A { color: #ef4444; }
    .symbol.B { color: #f97316; }
    .symbol.C { color: #22c55e; }
    .symbol.D { color: #3b82f6; }

    .controls {
      display: grid;
      gap: 15px;
    }

    .control-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    label {
      color: #fff;
      font-weight: 500;
      min-width: 120px;
    }

    input {
      flex: 1;
      padding: 12px;
      border: 2px solid #444;
      border-radius: 8px;
      background: #2a2a2a;
      color: #fff;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #ffd700;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 15px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(145deg, #ffd700, #ffaa00);
      color: #1a1a1a;
      box-shadow: 0 4px 0 #cc8800;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #cc8800;
    }

    .btn-primary:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #cc8800;
    }

    .btn-secondary {
      background: linear-gradient(145deg, #4a4a4a, #2a2a2a);
      color: #fff;
      box-shadow: 0 4px 0 #1a1a1a;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #1a1a1a;
    }

    .btn-secondary:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #1a1a1a;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .message {
      text-align: center;
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 1.1rem;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.win {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
      border: 1px solid #4ade80;
    }

    .message.lose {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .message.info {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
      border: 1px solid #3b82f6;
    }

    @media (max-width: 500px) {
      h1 { font-size: 2rem; }
      .symbol { width: 60px; height: 60px; font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎰 Lucky Slots</h1>
      <p class="subtitle">Try your luck and win big!</p>
    </header>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Balance</div>
        <div class="stat-value" id="balance">$0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Lines</div>
        <div class="stat-value" id="lines-display">1</div>
      </div>
      <div class="stat">
        <div class="stat-label">Bet/Line</div>
        <div class="stat-value" id="bet-display">$0</div>
      </div>
    </div>

    <div class="slot-machine">
      <div class="reels" id="reels">
        <div class="reel">
          <div class="symbol" id="0-0">-</div>
          <div class="symbol" id="0-1">-</div>
          <div class="symbol" id="0-2">-</div>
        </div>
        <div class="reel">
          <div class="symbol" id="1-0">-</div>
          <div class="symbol" id="1-1">-</div>
          <div class="symbol" id="1-2">-</div>
        </div>
        <div class="reel">
          <div class="symbol" id="2-0">-</div>
          <div class="symbol" id="2-1">-</div>
          <div class="symbol" id="2-2">-</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <div class="control-group" id="deposit-group">
        <label for="deposit">Deposit Amount:</label>
        <input type="number" id="deposit" min="1" step="1" placeholder="Enter amount">
      </div>

      <div class="control-group" id="lines-group" style="display: none;">
        <label for="lines">Lines (1-3):</label>
        <input type="number" id="lines" min="1" max="3" value="1">
      </div>

      <div class="control-group" id="bet-group" style="display: none;">
        <label for="bet">Bet per Line:</label>
        <input type="number" id="bet" min="1" step="1" placeholder="Enter bet">
      </div>

      <div class="button-group" id="deposit-btn-group">
        <button class="btn-primary" id="deposit-btn">Deposit</button>
      </div>

      <div class="button-group" id="game-btn-group" style="display: none;">
        <button class="btn-primary" id="spin-btn">Spin!</button>
        <button class="btn-secondary" id="reset-btn">Reset</button>
      </div>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script src="final.js"></script>
</body>
</html>
